# Pre-commit hooks for finhealth.
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually on the whole repo:
#   pre-commit run --all-files
#
# Hooks use `language: system` so they pick up the ruff / mypy already
# installed in the project's virtualenv. Activate the venv (or run
# `pre-commit` from inside it) so the tools resolve correctly.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: ruff check
        args: ["--fix"]
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy --strict
        entry: mypy
        args: ["--strict", "app/"]
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
